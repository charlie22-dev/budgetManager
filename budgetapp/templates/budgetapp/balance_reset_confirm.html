{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto anim-slide-up">
    <div class="bg-white dark:bg-dark-surface rounded-2xl border border-amber-100 dark:border-amber-500/20 shadow-sm overflow-hidden">
        <div class="px-6 py-8 text-center">
            <div class="w-14 h-14 rounded-2xl bg-amber-50 dark:bg-amber-500/10 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-rotate-left text-amber-500 text-xl"></i>
            </div>
            <h2 class="text-lg font-bold text-slate-800 dark:text-white mb-1">Reset Balance?</h2>
            <p class="text-sm text-slate-500 dark:text-gray-400">Your remaining balance will be reset to zero. Your expense and savings history will not be affected.</p>
        </div>
        <div class="px-6 pb-6 flex items-center gap-3">
            <a href="{% url 'dashboard' %}" class="flex-1 px-5 py-2.5 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 rounded-xl transition-colors text-center">Cancel</a>
            <form method="post" class="flex-1">
                {% csrf_token %}
                <button type="submit" class="w-full px-5 py-2.5 text-sm font-bold text-white bg-amber-500 hover:bg-amber-600 rounded-xl transition-colors shadow-sm shadow-amber-500/20 active:scale-[0.97]">Reset Balance</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
