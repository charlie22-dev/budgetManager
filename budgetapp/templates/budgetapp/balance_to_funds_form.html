{% extends 'base.html' %}
{% block content %}
<div class="form-card anim-slide-up">
    <div class="form-title dark:text-white dark:border-dark-border">
        <i class="fas fa-exchange-alt text-orange-500 mr-2"></i> Transfer Balance to Funds
    </div>

    <div class="flex items-center gap-2 mb-5 px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-500/10 border border-blue-100 dark:border-blue-500/20 text-sm font-medium text-blue-700 dark:text-blue-300">
        <i class="fas fa-wallet"></i>
        Available Balance: <strong>₱{{ current_balance|floatformat:2 }}</strong>
    </div>

    <form method="post" novalidate>
        {% csrf_token %}
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-gray-300 mb-1.5">
                    Amount to Transfer (₱) <span class="text-rose-500 ml-0.5">*</span>
                </label>
                <input type="number" name="amount" step="0.01" min="0.01" max="{{ current_balance }}"
                       placeholder="0.00"
                       class="w-full px-4 py-2.5 bg-white border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-primary-500 dark:bg-dark-bg dark:border-dark-border dark:text-white transition-all">
            </div>
        </div>

        <div class="flex items-center justify-end gap-3 mt-8 pt-5 border-t border-gray-100 dark:border-dark-border">
            <a href="{% url 'dashboard' %}" class="px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 rounded-xl transition-all">
                Cancel
            </a>
            <button type="submit"
                class="px-6 py-2.5 text-sm font-bold text-white bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 rounded-xl shadow-lg shadow-orange-500/25 active:scale-95 transition-all"
                onclick="this.innerHTML='<i class=\'fas fa-spinner fa-spin mr-2\'></i>Transferring...'; this.disabled=true; this.form.submit();">
                <i class="fas fa-exchange-alt mr-2"></i> Transfer to Funds
            </button>
        </div>
    </form>
</div>
{% endblock %}
