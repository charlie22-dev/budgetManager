{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto anim-slide-up">
    <div class="bg-white dark:bg-dark-surface rounded-2xl shadow-lg border border-rose-100 dark:border-dark-border overflow-hidden">
        <div class="bg-gradient-to-br from-rose-500 to-rose-600 p-6 text-center">
            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-trash-alt text-white text-2xl"></i>
            </div>
            <h2 class="text-xl font-bold text-white">Delete All Savings</h2>
            <p class="text-rose-100 text-sm mt-1">This action cannot be undone</p>
        </div>
        <div class="p-6">
            <p class="text-center text-gray-600 dark:text-gray-300 mb-6">
                Are you sure you want to delete <strong>all</strong> savings entries? This cannot be reversed.
            </p>
            <div class="flex gap-3">
                <a href="{% url 'savings_list' %}" class="flex-1 text-center px-5 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 rounded-xl transition-all">
                    Cancel
                </a>
                <form method="post" class="flex-1">
                    {% csrf_token %}
                    <button type="submit" class="w-full px-5 py-2.5 text-sm font-bold text-white bg-rose-600 hover:bg-rose-700 rounded-xl shadow-lg shadow-rose-500/30 active:scale-95 transition-all">
                        <i class="fas fa-trash mr-1.5"></i> Delete All
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
