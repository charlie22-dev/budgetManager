{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center anim-fade-in px-4">
    <div class="fixed top-20 left-1/4 w-[400px] h-[400px] bg-purple-500/20 dark:bg-purple-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-10 right-1/4 w-[400px] h-[400px] bg-indigo-500/20 dark:bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>

    <div class="w-full max-w-md relative z-10 anim-slide-up">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-white dark:bg-dark-surface shadow-xl shadow-purple-500/10 dark:shadow-purple-500/5 mb-6 border border-slate-100 dark:border-dark-border transition-all duration-500 hover:scale-110">
                <i class="fas fa-unlock text-3xl text-purple-600 dark:text-purple-500 transition-transform duration-500 group-hover:rotate-12"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2 tracking-tight">Set New Password</h1>
            <p class="text-slate-500 dark:text-gray-400 font-medium text-sm">Create a new strong password for your account.</p>
        </div>

        <div class="bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-xl border border-white/50 dark:border-slate-700/50 rounded-3xl shadow-2xl p-8 relative overflow-hidden">

            {% if messages %}
            {% for message in messages %}
            <div class="p-4 mb-6 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/20 rounded-2xl text-rose-600 dark:text-rose-400 text-sm font-medium flex gap-3 items-center">
                <i class="fas fa-exclamation-circle"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'password_reset_confirm' %}" id="confirmForm" class="space-y-5">
                {% csrf_token %}

                <!-- New Password -->
                <div class="space-y-2 relative" x-data="{ focused: false, val: '', show: false }">
                    <label for="id_password1" class="absolute left-10 transition-all duration-200 pointer-events-none text-slate-400 dark:text-slate-500 font-medium z-10"
                           :class="focused || val.length > 0 ? '-top-3 text-xs bg-[linear-gradient(180deg,transparent_50%,white_50%)] dark:bg-[linear-gradient(180deg,transparent_50%,#1e293b_50%)] px-1 text-purple-600 dark:text-purple-400' : 'top-3.5 text-sm bg-transparent'">
                        New Password
                    </label>
                    <div class="relative flex items-center">
                        <i class="fas fa-lock absolute left-4 text-slate-400 dark:text-slate-500 z-10 transition-colors"
                           :class="focused ? 'text-purple-600 dark:text-purple-400' : ''"></i>
                        <input :type="show ? 'text' : 'password'" name="password1" id="id_password1" required
                               class="w-full !pl-11 !pr-12 !py-3.5 bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:border-purple-600 dark:focus:border-purple-400 focus:ring-4 focus:ring-purple-600/10 dark:focus:ring-purple-400/20 transition-all outline-none"
                               @focus="focused = true" @blur="focused = false" x-model="val" autocomplete="new-password"
                               @input="checkStrength($event.target.value)">
                        <button type="button" @click="show = !show"
                                class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors z-10">
                            <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                    <!-- Strength bar -->
                    <div class="flex gap-1 mt-2 px-1" id="strengthBars">
                        <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-colors" id="bar1"></div>
                        <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-colors" id="bar2"></div>
                        <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-colors" id="bar3"></div>
                        <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-colors" id="bar4"></div>
                    </div>
                    <p id="strengthLabel" class="text-xs text-slate-400 dark:text-slate-500 px-1"></p>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2 relative" x-data="{ focused: false, val: '', show: false }">
                    <label for="id_password2" class="absolute left-10 transition-all duration-200 pointer-events-none text-slate-400 dark:text-slate-500 font-medium z-10"
                           :class="focused || val.length > 0 ? '-top-3 text-xs bg-[linear-gradient(180deg,transparent_50%,white_50%)] dark:bg-[linear-gradient(180deg,transparent_50%,#1e293b_50%)] px-1 text-purple-600 dark:text-purple-400' : 'top-3.5 text-sm bg-transparent'">
                        Confirm Password
                    </label>
                    <div class="relative flex items-center">
                        <i class="fas fa-lock absolute left-4 text-slate-400 dark:text-slate-500 z-10 transition-colors"
                           :class="focused ? 'text-purple-600 dark:text-purple-400' : ''"></i>
                        <input :type="show ? 'text' : 'password'" name="password2" id="id_password2" required
                               class="w-full !pl-11 !pr-12 !py-3.5 bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:border-purple-600 dark:focus:border-purple-400 focus:ring-4 focus:ring-purple-600/10 dark:focus:ring-purple-400/20 transition-all outline-none"
                               @focus="focused = true" @blur="focused = false" x-model="val" autocomplete="new-password">
                        <button type="button" @click="show = !show"
                                class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors z-10">
                            <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="confirmBtn"
                        class="w-full relative py-4 mt-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-xl shadow-lg hover:-translate-y-0.5 hover:shadow-xl hover:bg-slate-800 dark:hover:bg-slate-100 active:scale-[0.98] transition-all overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 dark:via-black/10 to-transparent -translate-x-[150%] skew-x-[-20deg] group-hover:animate-shine"></div>
                    <span id="confirmBtnText" class="flex items-center justify-center gap-2">
                        Update Password <i class="fas fa-check text-sm transition-transform group-hover:scale-110"></i>
                    </span>
                    <span id="confirmBtnLoader" class="hidden items-center justify-center gap-2">
                        <i class="fas fa-circle-notch fa-spin"></i> Saving...
                    </span>
                </button>
            </form>
        </div>

        <p class="text-center text-xs font-medium text-slate-500 dark:text-slate-500 mt-10 tracking-widest uppercase opacity-80">
            Secure Budget Management
        </p>
    </div>
</div>

<style>
    @keyframes shine { 100% { transform: translateX(150%); } }
    .animate-shine { animation: shine 1.5s ease-in-out infinite; }
</style>

<script>
function checkStrength(password) {
    const bars   = [document.getElementById('bar1'), document.getElementById('bar2'),
                    document.getElementById('bar3'), document.getElementById('bar4')];
    const label  = document.getElementById('strengthLabel');
    const colors = { 1: 'bg-rose-500', 2: 'bg-amber-400', 3: 'bg-yellow-400', 4: 'bg-emerald-500' };
    const labels = { 0: '', 1: 'Weak', 2: 'Fair', 3: 'Good', 4: 'Strong' };

    let score = 0;
    if (password.length >= 8)  score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

    bars.forEach((bar, i) => {
        bar.className = 'h-1 flex-1 rounded-full transition-colors ' +
            (i < score ? (colors[score] || 'bg-emerald-500') : 'bg-slate-200 dark:bg-slate-700');
    });
    label.textContent = labels[score] || '';
    label.className   = 'text-xs px-1 ' + (score <= 1 ? 'text-rose-500' : score === 2 ? 'text-amber-500' : score === 3 ? 'text-yellow-500' : 'text-emerald-500');
}

document.addEventListener('DOMContentLoaded', () => {
    const form    = document.getElementById('confirmForm');
    const btn     = document.getElementById('confirmBtn');
    const btnText = document.getElementById('confirmBtnText');
    const btnLoad = document.getElementById('confirmBtnLoader');
    form.addEventListener('submit', () => {
        btn.classList.add('opacity-90', 'cursor-not-allowed');
        btnText.classList.add('hidden'); btnText.classList.remove('flex');
        btnLoad.classList.remove('hidden'); btnLoad.classList.add('flex');
        setTimeout(() => { btn.disabled = true; }, 10);
    });
});
</script>
{% endblock %}
