{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center anim-fade-in px-4">
    <div class="fixed top-20 left-1/4 w-[400px] h-[400px] bg-blue-500/20 dark:bg-blue-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-10 right-1/4 w-[400px] h-[400px] bg-indigo-500/20 dark:bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>

    <div class="w-full max-w-md relative z-10 anim-slide-up">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-white dark:bg-dark-surface shadow-xl shadow-blue-500/10 dark:shadow-blue-500/5 mb-6 group border border-slate-100 dark:border-dark-border transition-all duration-500 hover:scale-110">
                <i class="fas fa-key text-3xl text-blue-600 dark:text-blue-500 transition-transform duration-500 group-hover:rotate-12"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2 tracking-tight">Forgot Password?</h1>
            <p class="text-slate-500 dark:text-gray-400 font-medium text-sm">Enter your email and we'll send a 6-digit reset code.</p>
        </div>

        <div class="bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-xl border border-white/50 dark:border-slate-700/50 rounded-3xl shadow-2xl p-8 relative overflow-hidden">

            <form method="POST" action="{% url 'password_reset_request' %}" id="otpRequestForm" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-2 relative" x-data="{ focused: false, val: '' }">
                    <label for="id_email"
                           class="absolute left-10 transition-all duration-200 pointer-events-none text-slate-400 dark:text-slate-500 font-medium z-10"
                           :class="focused || val.length > 0
                             ? '-top-3 text-xs bg-[linear-gradient(180deg,transparent_50%,white_50%)] dark:bg-[linear-gradient(180deg,transparent_50%,#1e293b_50%)] px-1 text-blue-600 dark:text-blue-400'
                             : 'top-3.5 text-sm bg-transparent'">
                        E-mail Address
                    </label>
                    <div class="relative flex items-center">
                        <i class="fas fa-envelope absolute left-4 text-slate-400 dark:text-slate-500 transition-colors z-10"
                           :class="focused ? 'text-blue-600 dark:text-blue-500' : ''"></i>
                        <input type="email" name="email" id="id_email" required autocomplete="email"
                               class="w-full !pl-11 !pr-4 !py-3.5 bg-transparent border-2 border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:border-blue-600 dark:focus:border-blue-500 focus:ring-4 focus:ring-blue-600/10 dark:focus:ring-blue-500/20 transition-all outline-none"
                               @focus="focused = true" @blur="focused = false" x-model="val">
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full relative py-4 mt-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-xl shadow-lg hover:-translate-y-0.5 hover:shadow-xl hover:bg-slate-800 dark:hover:bg-slate-100 active:scale-[0.98] transition-all overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 dark:via-black/10 to-transparent -translate-x-[150%] skew-x-[-20deg] group-hover:animate-shine"></div>
                    <span id="btnText" class="flex items-center justify-center gap-2">
                        Send OTP Code <i class="fas fa-paper-plane text-sm transition-transform group-hover:translate-x-1"></i>
                    </span>
                    <span id="btnLoader" class="hidden items-center justify-center gap-2">
                        <i class="fas fa-circle-notch fa-spin"></i> Sending...
                    </span>
                </button>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-slate-100 dark:border-slate-800">
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">
                    Remembered your password?
                    <a href="{% url 'account_login' %}" class="font-bold text-slate-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors ml-1 border-b border-transparent hover:border-blue-600 dark:hover:border-blue-400">Back to Login</a>
                </p>
            </div>
        </div>

        <p class="text-center text-xs font-medium text-slate-500 dark:text-slate-500 mt-10 tracking-widest uppercase opacity-80">
            Secure Budget Management
        </p>
    </div>
</div>

<style>
    @keyframes shine { 100% { transform: translateX(150%); } }
    .animate-shine { animation: shine 1.5s ease-in-out infinite; }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('otpRequestForm');
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    form.addEventListener('submit', () => {
        btn.classList.add('opacity-90', 'cursor-not-allowed');
        btnText.classList.add('hidden'); btnText.classList.remove('flex');
        btnLoader.classList.remove('hidden'); btnLoader.classList.add('flex');
        setTimeout(() => { btn.disabled = true; }, 10);
    });
});
</script>
{% endblock %}
