{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center anim-fade-in px-4">
    <!-- Decorative Ambient Glow Background -->
    <div class="fixed top-20 left-1/4 w-[400px] h-[400px] bg-green-500/20 dark:bg-emerald-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-10 right-1/4 w-[400px] h-[400px] bg-teal-500/20 dark:bg-teal-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>

    <!-- Main Container -->
    <div class="w-full max-w-md relative z-10 anim-slide-up">
        
        <!-- App Branding / Icon -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-white dark:bg-dark-surface shadow-xl shadow-green-500/10 dark:shadow-green-500/5 mb-6 group border border-slate-100 dark:border-dark-border">
                <i class="fas fa-check-double text-3xl text-emerald-500 dark:text-emerald-400"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2 tracking-tight">Password Changed!</h1>
            <p class="text-slate-500 dark:text-gray-400 font-medium text-sm">You have successfully updated your password.</p>
        </div>

        <!-- The Message Card -->
        <div class="bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-xl border border-white/50 dark:border-slate-700/50 rounded-3xl shadow-2xl p-8 transition-all relative overflow-hidden text-center">
            
            <p class="text-slate-600 dark:text-slate-300 mb-6 font-medium">
                Your password has been changed. You can now use your new password to sign in to your dashboard.
            </p>

            <a href="{% url 'account_login' %}" class="inline-flex w-full items-center justify-center py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-xl shadow-lg hover:-translate-y-0.5 hover:shadow-xl hover:bg-slate-800 dark:hover:bg-slate-100 active:scale-[0.98] transition-all overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 dark:via-black/10 to-transparent -translate-x-[150%] skew-x-[-20deg] group-hover:animate-shine"></div>
                <span class="flex items-center justify-center gap-2">
                    Proceed to Login <i class="fas fa-arrow-right text-sm transition-transform group-hover:translate-x-1"></i>
                </span>
            </a>
        </div>

        <p class="text-center text-xs font-medium text-slate-500 dark:text-slate-500 mt-10 tracking-widest uppercase opacity-80">
            Secure Budget Management
        </p>
    </div>
</div>

<style>
    @keyframes shine {
        100% { transform: translateX(150%); }
    }
    .animate-shine { animation: shine 1.5s ease-in-out infinite; }
</style>
{% endblock %}
